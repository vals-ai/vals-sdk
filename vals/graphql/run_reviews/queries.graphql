query GetSingleRunReview($runReviewId: String!) {
  singleRunReview(runReviewId: $runReviewId) {
    id
    createdBy
    createdAt
    status
    passRate
    flaggedRate
    agreementRate
    completedTime
    numberOfReviews
    assignedReviewers
    rereviewAutoEval
    run {
      id
    }
    customReviewTemplates {
      id
      name
      instructions
      categories
      type
      optional
      minValue
      maxValue
    }
  }
}

query SingleTestResultReviewsWithCount(
  $runId: String!
  $filterOptions: TestReviewFilterOptionsInput
) {
  testResultReviewsWithCount(runId: $runId, filterOptions: $filterOptions) {
    count
    singleTestResults {
      id
      reviewedBy
      hasFeedback
      agreementRateAutoEval
      agreementRateHumanEval
      passRateHumanEval
      passPercentage
      amountReviewed
      latestCompletedReview
      aggregatedCustomMetrics {
        name
        type
        displayed
        instructions
        values
        max
      }
      singleTestReviews {
        id
        completedBy
        feedback
        completedAt
        startedAt
        createdBy
        status
        perCheckTestReviewTyped {
          binaryHumanEval
          isFlagged
        }
        testResult {
          id
          llmOutput
          qaPair {
            outputContext
          }
          test {
            testId
            inputUnderTest
            typedContext
            typedFileIds
          }
          typedResultJson {
            autoEval
            criteria
            operator
          }
        }
        customReviewValues {
          template {
            id
            name
            instructions
            optional
            categories
            type
            minValue
            maxValue
          }
          value
        }
      }
    }
  }
}
